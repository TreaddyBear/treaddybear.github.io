<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon Prototype</title>
  </head>
  <body>
    <div id="hud">
      <div id="score">Score: 0</div>
      <div id="meter"><div id="meterFill"></div></div>
    </div>
    <details id="settings">
      <summary>Settings</summary>
      <label>Min grass height <span data-value-for="minHeight"></span><input id="minHeight" type="range" min="0.1" max="1.4" step="0.01" value="0.38" /></label>
      <label>Max grass height <span data-value-for="maxHeight"></span><input id="maxHeight" type="range" min="0.2" max="2.8" step="0.01" value="0.76" /></label>
      <label>Clump strength <span data-value-for="clumpStrength"></span><input id="clumpStrength" type="range" min="0" max="3" step="0.01" value="0.55" /></label>
      <label>Blade randomness <span data-value-for="heightRandomness"></span><input id="heightRandomness" type="range" min="0" max="3" step="0.01" value="0.2" /></label>
      <label>Wind sway <span data-value-for="windStrength"></span><input id="windStrength" type="range" min="0" max="0.8" step="0.01" value="0.1" /></label>
      <label>Mower bend <span data-value-for="bendStrength"></span><input id="bendStrength" type="range" min="0" max="1.5" step="0.01" value="0.18" /></label>
      <label>Turn build-up <span data-value-for="turnBuild"></span><input id="turnBuild" type="range" min="0.05" max="3" step="0.01" value="0.65" /></label>
      <label>Grass base color <input id="grassBaseColor" type="color" value="#2f7d23" /></label>
      <label>Hue variance <span data-value-for="hueVariance"></span><input id="hueVariance" type="range" min="0" max="0.25" step="0.005" value="0.035" /></label>
      <label>Saturation variance <span data-value-for="satVariance"></span><input id="satVariance" type="range" min="0" max="0.8" step="0.01" value="0.18" /></label>
      <label>Lightness variance <span data-value-for="lightVariance"></span><input id="lightVariance" type="range" min="0" max="0.8" step="0.01" value="0.16" /></label>
      <label>Cut color <input id="cutGrassColor" type="color" value="#48a329" /></label>
      <label>Ground color <input id="groundColor" type="color" value="#6b8014" /></label>
    </details>
    <canvas id="renderCanvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
